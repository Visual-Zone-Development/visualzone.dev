<header class="site-header" [class.scrolled]="scrolled()">
  <div class="header-inner">
    <!-- Logo -->
    <a class="logo" routerLink="/" (click)="closeMenu()">
      <img src="assets/images/vz-logo-gold-white.png" alt="Visual Zone Development logo" height="36" />
      <span class="logo-text">Visual<span class="logo-accent">Zone</span></span>
    </a>

    <!-- Desktop nav -->
    <nav class="desktop-nav">
      @if (isHome()) {
        <button class="nav-link" (click)="scrollToSection('projects')">Projects</button>
        <button class="nav-link" (click)="scrollToSection('new')">What's New</button>
        <button class="nav-link" (click)="scrollToSection('contact')">Contact</button>
        <a
          class="nav-cta"
          href="https://github.com/Visual-Zone-Development"
          target="_blank"
          rel="noopener"
        >GitHub</a>
      } @else {
        <a routerLink="/" class="nav-link back-link">
          <mat-icon>arrow_back</mat-icon> Back to Home
        </a>
      }
    </nav>

    <!-- Mobile hamburger -->
    <button
      mat-icon-button
      class="hamburger"
      (click)="toggleMenu()"
      [attr.aria-expanded]="mobileOpen()"
      aria-label="Toggle navigation"
    >
      <mat-icon>{{ mobileOpen() ? 'close' : 'menu' }}</mat-icon>
    </button>
  </div>

  <!-- Mobile dropdown -->
  @if (mobileOpen()) {
    <nav class="mobile-nav">
      @if (isHome()) {
        <button class="nav-link" (click)="scrollToSection('projects')">Projects</button>
        <button class="nav-link" (click)="scrollToSection('new')">What's New</button>
        <button class="nav-link" (click)="scrollToSection('contact')">Contact</button>
        <a
          class="nav-cta"
          href="https://github.com/Visual-Zone-Development"
          target="_blank"
          rel="noopener"
          (click)="closeMenu()"
        >GitHub</a>
      } @else {
        <a routerLink="/" (click)="closeMenu()" class="nav-link back-link">
          <mat-icon>arrow_back</mat-icon> Back to Home
        </a>
      }
    </nav>
  }
</header>
